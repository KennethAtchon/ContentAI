# Railway configuration for ContentAI Frontend
# This file tells Railway how to build and deploy your frontend application using Docker

[build]
# Use Dockerfile for building
dockerfile = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "frontend"
startCommand = "bun run preview --host 0.0.0.0 --port 4173"

[services.variables]
NODE_ENV = "production"
VITE_API_URL = "${RAILWAY_PUBLIC_URL}"
VITE_APP_NAME = "ContentAI"
VITE_APP_URL = "${RAILWAY_PUBLIC_URL}"

[[services.ports]]
port = 4173
handlers = ["http"]

[services.ports.concurrency]
type = "connections"
soft = 200
hard = 250

[[services.ports.health_checks]]
path = "/"
scheme = "http"
interval_seconds = 30
timeout_seconds = 20
method = "GET"
grace_period_seconds = 10
