# Optional override: use with `docker compose -f docker-compose.yml -f docker-compose.dev-mock.yml up`
# or `./docker-scripts.sh start --mock-externals`
#
# Forces DEV_MOCK_EXTERNAL_INTEGRATIONS=true on the backend container (fixture video/TTS + mock scrape).
# See docs/plans/dev-mock-external-integrations.md

services:
  backend:
    environment:
      DEV_MOCK_EXTERNAL_INTEGRATIONS: "true"
