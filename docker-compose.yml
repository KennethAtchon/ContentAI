name: contentai

x-bun-service: &bun-service
  init: true
  networks:
    - contentai-network

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contentAI}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-contentAI}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contentai-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contentai-network

  backend:
    <<: *bun-service
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-contentAI}?sslmode=disable
      REDIS_URL: redis://redis:6379
      DEV_MOCK_EXTERNAL_INTEGRATIONS: ${DEV_MOCK_EXTERNAL_INTEGRATIONS:-true}
      BUN_INSTALL_CACHE_DIR: /root/.bun/install/cache
    ports:
      - "3001:3001"
    volumes:
      - ./:/workspace
      - backend_node_modules:/workspace/node_modules
      - backend_bun_cache:/root/.bun/install/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    <<: *bun-service
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    env_file:
      - ./.env
      - ./frontend/.env
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_DEV_HOST: 0.0.0.0
      VITE_DEV_PROXY_TARGET: http://backend:3001
      VITE_USE_POLLING: ${VITE_USE_POLLING:-true}
      VITE_POLLING_INTERVAL: ${VITE_POLLING_INTERVAL:-300}
      BUN_INSTALL_CACHE_DIR: /root/.bun/install/cache
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/node_modules
      - frontend_bun_cache:/root/.bun/install/cache
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  e2e-tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile.e2e
      target: e2e
    environment:
      NODE_ENV: test
      E2E_BASE_URL: http://frontend:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/contentAI?sslmode=disable
      VITE_API_URL: http://backend:3001
      VITE_APP_URL: http://frontend:3000
    env_file:
      - ./backend/.env
    volumes:
      - ./frontend/test-results:/app/test-results
      - ./frontend/playwright-report:/app/playwright-report
      - ./backend:/app/backend:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - contentai-network
    profiles:
      - e2e

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
  backend_bun_cache:
  frontend_bun_cache:

networks:
  contentai-network:
    driver: bridge
